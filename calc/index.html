<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Jobsite Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=./wwwroot/" />
    <link rel="canonical" href="https://dondlingergc.com/calc/" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #11161d;
            --panel: #1b2430;
            --accent: #00d4ff;
            --text: #f5f7fb;
            --muted: #9db0c7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(0, 212, 255, 0.22), transparent 35%),
                linear-gradient(180deg, #0c1117 0%, var(--bg) 100%);
            color: var(--text);
            font: 16px/1.5 Arial, sans-serif;
        }

        main {
            width: min(92vw, 34rem);
            padding: 2rem;
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-radius: 20px;
            background: rgba(27, 36, 48, 0.9);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
        }

        p {
            margin: 0 0 1rem;
            color: var(--muted);
        }

        a {
            display: inline-block;
            padding: 0.9rem 1.2rem;
            border-radius: 999px;
            background: var(--accent);
            color: #0b1117;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
    <script>
        window.location.replace('./wwwroot/');
    </script>
</head>
<body>
    <main>
        <h1>Opening Jobsite Calculator</h1>
        <p>If the calculator does not open automatically, use the button below.</p>
        <a href="./wwwroot/">Open calculator</a>
    </main>
</body>
</html>
