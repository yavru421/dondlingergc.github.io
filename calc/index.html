    <script>
        // Service worker registration
        if (window.top === window.self && 'serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
        }

        // Android/Chrome: show install button via beforeinstallprompt
        let deferredPrompt;
        const installBtn = document.getElementById('installPwaBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const choiceResult = await deferredPrompt.userChoice;
                if (choiceResult.outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            document.getElementById('iosBanner').style.display = 'none';
        });

        // iOS Safari: show "Add to Home Screen" banner when not already installed as PWA
        (function () {
            const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const isSafari = /^((?!chrome|android|crios|fxios).)*safari/i.test(navigator.userAgent);
            const isStandalone = window.navigator.standalone === true;
            if (isIos && isSafari && !isStandalone) {
                document.getElementById('iosBanner').style.display = 'block';
            }
        })();
    </script>
