<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jobsite Calculator</title>
    <base href="/calc/" />
    <meta name="theme-color" content="#ffcc00" />
    <meta name="description" content="Dewalt-style construction calculator: bold yellow/black, mode cards, large keys, phone-first layout." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Jobsite Calculator" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="updateBanner" class="update-banner" hidden>
        <span>New version ready.</span>
        <button type="button" id="updateBtn">Reload</button>
    </div>

    <div class="app-shell">
        <header class="topbar">
            <a class="brand" href="/">
                <div style="background:#222;">
                  <header style="background:#ffcc00;color:#222;padding:1.2rem 0 1rem 0;text-align:center;font-family:'Segoe UI',sans-serif;font-weight:700;font-size:1.3rem;letter-spacing:0.08em;box-shadow:0 2px 12px #222;">
                    <span style="font-size:1.6rem;vertical-align:middle;margin-right:0.7rem;">&#128295;</span>
                    DEWALT Jobsite Calculator
                  </header>
                  <main style="max-width:480px;margin:0 auto;padding:2rem 1rem 3rem 1rem;background:#222;border-radius:1.2rem;box-shadow:0 8px 32px #111;">
                    <nav style="display:flex;justify-content:space-between;margin-bottom:2rem;">
                      <button style="flex:1;margin:0 0.5rem;background:#ffcc00;color:#222;font-weight:700;font-size:1.1rem;padding:0.8rem 0;border-radius:1rem;border:none;box-shadow:0 2px 8px #222;cursor:pointer;" data-mode="tape">Tape Math</button>
                      <button style="flex:1;margin:0 0.5rem;background:#ffcc00;color:#222;font-weight:700;font-size:1.1rem;padding:0.8rem 0;border-radius:1rem;border:none;box-shadow:0 2px 8px #222;cursor:pointer;" data-mode="spacing">Spacing</button>
                      <button style="flex:1;margin:0 0.5rem;background:#ffcc00;color:#222;font-weight:700;font-size:1.1rem;padding:0.8rem 0;border-radius:1rem;border:none;box-shadow:0 2px 8px #222;cursor:pointer;" data-mode="concrete">Concrete</button>
                    </nav>
                    <section id="calc-panel" style="background:#333;border-radius:1rem;padding:1.5rem 1rem;margin-bottom:2rem;box-shadow:0 2px 12px #111;">
                      <div id="calc-title" style="font-size:1.2rem;font-weight:700;color:#ffcc00;margin-bottom:1rem;text-align:center;">Tape Math</div>
                      <input id="calc-input" type="text" placeholder="3-1/2 + 7-5/8" style="width:100%;font-size:1.2rem;padding:0.8rem;border-radius:0.8rem;border:none;background:#222;color:#fff;margin-bottom:1.2rem;box-shadow:0 1px 4px #111;" />
                      <div id="calc-result" style="font-size:2rem;font-weight:700;color:#ffcc00;text-align:center;margin-bottom:0.7rem;">11-1/8"</div>
                      <div id="calc-meta" style="color:#aaa;text-align:center;font-size:1rem;">11.1250 decimal inches</div>
                    </section>
                    <section style="display:flex;flex-wrap:wrap;gap:0.7rem;justify-content:center;margin-bottom:2rem;">
                      <button style="background:#ffcc00;color:#222;font-weight:700;padding:0.7rem 1.2rem;border-radius:999px;border:none;box-shadow:0 2px 8px #222;cursor:pointer;" onclick="document.getElementById('calc-input').value='3-1/2 + 7-5/8';">Stud + trim</button>
                      <button style="background:#ffcc00;color:#222;font-weight:700;padding:0.7rem 1.2rem;border-radius:999px;border:none;box-shadow:0 2px 8px #222;cursor:pointer;" onclick="document.getElementById('calc-input').value='96 / 5';">Equal panels</button>
                      <button style="background:#ffcc00;color:#222;font-weight:700;padding:0.7rem 1.2rem;border-radius:999px;border:none;box-shadow:0 2px 8px #222;cursor:pointer;" onclick="document.getElementById('calc-input').value='12 * 4-1/4';">Repeated cut</button>
                    </section>
                    <button id="installPwaBtn" style="display:block;width:100%;background:#ffcc00;color:#222;font-weight:700;font-size:1.1rem;padding:1rem 0;border-radius:1rem;border:none;box-shadow:0 2px 8px #222;cursor:pointer;margin-bottom:1.5rem;">Install Calculator App</button>
                  </main>
                  <footer style="text-align:center;color:#aaa;font-size:0.95rem;padding:1.5rem 0 0;">&copy; 2026 Dondlinger GC — Dewalt style calculator</footer>
                </div>
                <script>
                  // Mode switching
                  const modeBtns = document.querySelectorAll('[data-mode]');
                  const calcTitle = document.getElementById('calc-title');
                  const calcInput = document.getElementById('calc-input');
                  const calcResult = document.getElementById('calc-result');
                  const calcMeta = document.getElementById('calc-meta');
                  let mode = 'tape';
                  modeBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                      modeBtns.forEach(b => b.style.background = '#ffcc00');
                      btn.style.background = '#222';
                      btn.style.color = '#ffcc00';
                      mode = btn.getAttribute('data-mode');
                      calcTitle.textContent = btn.textContent;
                      if (mode === 'tape') {
                        calcInput.placeholder = '3-1/2 + 7-5/8';
                      } else if (mode === 'spacing') {
                        calcInput.placeholder = '10\' 0" / 16';
                      } else if (mode === 'concrete') {
                        calcInput.placeholder = '12 x 16 x 4';
                      }
                      calcInput.value = '';
                      calcResult.textContent = '';
                      calcMeta.textContent = '';
                    });
                  });
                  // Simple calculation logic (stub)
                  calcInput.addEventListener('input', () => {
                    let val = calcInput.value.trim();
                    if (!val) {
                      calcResult.textContent = '';
                      calcMeta.textContent = '';
                      return;
                    }
                    // Tape math: just show stub result
                    if (mode === 'tape') {
                      calcResult.textContent = '11-1/8"';
                      calcMeta.textContent = '11.1250 decimal inches';
                    } else if (mode === 'spacing') {
                      calcResult.textContent = '7-1/2"';
                      calcMeta.textContent = '16 equal spaces across 10\' 0"';
                    } else if (mode === 'concrete') {
                      calcResult.textContent = '2.37 yd³';
                      calcMeta.textContent = '64.00 cubic feet total';
                    }
                  });
                  // Install button
                  const installBtn = document.getElementById('installPwaBtn');
                  let deferredPrompt = null;
                  window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    installBtn.style.display = 'block';
                  });
                  installBtn.addEventListener('click', async () => {
                    if (deferredPrompt) {
                      deferredPrompt.prompt();
                      await deferredPrompt.userChoice;
                      deferredPrompt = null;
                      installBtn.style.display = 'none';
                    }
                  });
                  window.addEventListener('appinstalled', () => {
                    installBtn.style.display = 'none';
                  });
                </script>
