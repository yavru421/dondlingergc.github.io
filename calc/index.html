    <script src="_framework/blazor.webassembly.66stpp682q.js"></script>
    <script>
        // ── Service Worker ──────────────────────────────────────────────
        if (window.top === window.self && 'serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
                .then(reg => {
                    // Listen for a waiting SW (new version ready)
                    const checkWaiting = (r) => {
                        if (r && r.waiting) {
                            document.getElementById('updateBanner').style.display = 'flex';
                        }
                    };
                    checkWaiting(reg);
                    reg.addEventListener('updatefound', () => {
                        const nw = reg.installing;
                        if (nw) nw.addEventListener('statechange', () => {
                            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                                document.getElementById('updateBanner').style.display = 'flex';
                            }
                        });
                    });
                });
        }

        // ── Install prompt (Android/Chrome) ────────────────────────────
        let _deferredPrompt;
        const installBtn = document.getElementById('installPwaBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            _deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        installBtn.addEventListener('click', async () => {
            if (_deferredPrompt) {
                _deferredPrompt.prompt();
                const { outcome } = await _deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                _deferredPrompt = null;
            }
        });
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            document.getElementById('iosBanner').style.display = 'none';
        });

        // ── iOS Safari install banner ───────────────────────────────────
        (function () {
            const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
            const isSafari = /^((?!chrome|android|crios|fxios).)*safari/i.test(navigator.userAgent);
            const isStandalone = window.navigator.standalone === true;
            if (isIos && isSafari && !isStandalone) {
                document.getElementById('iosBanner').style.display = 'block';
            }
        })();

        // ── Offline / Online badge ──────────────────────────────────────
        (function () {
            const badge = document.getElementById('offlineBadge');
            const update = () => {
                badge.style.display = navigator.onLine ? 'none' : 'block';
            };
            update();
            window.addEventListener('online', update);
            window.addEventListener('offline', update);
        })();

        // ── Wake Lock (keep screen on while app is open) ───────────────
        (function () {
            if (!('wakeLock' in navigator)) return;
            let lock = null;
            const acquire = async () => {
                try { lock = await navigator.wakeLock.request('screen'); }
                catch (_) {}
            };
            acquire();
            // Re-acquire after tab becomes visible again
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') acquire();
            });
        })();

        // ── Haptic feedback helper exposed to Blazor ───────────────────
        // Blazor components can call: window.triggerHaptic('light'|'medium'|'heavy')
        window.triggerHaptic = function (type) {
            if (!('vibrate' in navigator)) return;
            const patterns = { light: [10], medium: [30], heavy: [60, 20, 60] };
            navigator.vibrate(patterns[type] || patterns.light);
        };

        // ── Clipboard helper exposed to Blazor ─────────────────────────
        window.copyText = async function (text) {
            if (navigator.clipboard) {
                try { await navigator.clipboard.writeText(text); return true; }
                catch (_) {}
            }
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            return ok;
        };

        // ── Share helper exposed to Blazor ─────────────────────────────
        window.shareResult = async function (title, text) {
            if (navigator.share) {
                try {
                    await navigator.share({ title, text, url: location.href });
                    return true;
                } catch (_) {}
            }
            return window.copyText(text);
        };
    </script>
