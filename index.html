<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dondlinger General Contracting</title>
    <meta name="description" content="Dondlinger General Contracting and the Jobsite Calculator, a free offline-first construction calculator with live outputs." />
    <meta name="theme-color" content="#12161c" />
    <style>
        :root {
            color-scheme: dark;
            --bg: #12161c;
            --bg-2: #1a212a;
            --panel: rgba(14, 19, 25, 0.9);
            --line: rgba(255, 255, 255, 0.08);
            --text: #f1eee8;
            --muted: #9eacba;
            --signal: #7dd6ff;
            --accent: #d49b3e;
            --accent-strong: #f1c26d;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            color: var(--text);
            font: 16px/1.55 "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(125, 214, 255, 0.14), transparent 32%),
                radial-gradient(circle at top right, rgba(212, 155, 62, 0.14), transparent 24%),
                linear-gradient(180deg, var(--bg-2), var(--bg));
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(125, 214, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(125, 214, 255, 0.05) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 90%);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: min(100%, 76rem);
            margin: 0 auto;
            padding: 0 clamp(1rem, 4vw, 2rem);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 0;
            background: rgba(18, 22, 28, 0.84);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--line);
        }

        .brand {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .brand strong {
            font: 700 1.1rem/1 "Georgia", serif;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .brand span {
            margin-top: 0.25rem;
            color: var(--accent-strong);
            font-size: 0.74rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 2.8rem;
            padding: 0.7rem 1.1rem;
            border-radius: 999px;
            border: 1px solid rgba(212, 155, 62, 0.28);
            background: linear-gradient(135deg, rgba(212, 155, 62, 0.18), rgba(125, 214, 255, 0.12));
            color: var(--accent-strong);
            font-weight: 700;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(18rem, 0.85fr);
            gap: 1.25rem;
            padding: clamp(3rem, 8vw, 6rem) 0 2rem;
            align-items: center;
        }

        .eyebrow {
            margin: 0 0 1rem;
            color: var(--accent-strong);
            font-size: 0.78rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            max-width: 10ch;
            font: 700 clamp(3rem, 7vw, 5.2rem)/0.94 "Georgia", serif;
            letter-spacing: -0.04em;
        }

        .hero p {
            max-width: 40rem;
            color: var(--muted);
            font-size: 1.05rem;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .hero-actions a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 3rem;
            padding: 0.8rem 1.2rem;
            border-radius: 999px;
            font-weight: 700;
        }

        .hero-actions .primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #16110a;
        }

        .hero-actions .secondary {
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.04);
        }

        .preview,
        .feature {
            border: 1px solid var(--line);
            border-radius: 1.35rem;
            background: var(--panel);
        }

        .preview {
            padding: 1.25rem;
        }

        .preview-label {
            color: var(--signal);
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .preview-value {
            margin-top: 0.75rem;
            font: 700 2.5rem/1 "Georgia", serif;
        }

        .preview-list {
            display: grid;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .preview-row {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--line);
            color: var(--muted);
        }

        .preview-row strong {
            color: var(--text);
        }

        .stats,
        .features {
            display: grid;
            gap: 1rem;
        }

        .stats {
            grid-template-columns: repeat(4, minmax(0, 1fr));
            margin: 0 0 1rem;
        }

        .stat,
        .feature {
            padding: 1.1rem;
        }

        .stat strong {
            display: block;
            color: var(--accent-strong);
            font: 700 1.6rem/1 "Georgia", serif;
        }

        .stat span,
        .feature p {
            color: var(--muted);
        }

        .features {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            padding-bottom: 4rem;
        }

        .feature h2 {
            margin: 0 0 0.5rem;
            font-size: 1rem;
        }

        footer {
            border-top: 1px solid var(--line);
            padding: 1.5rem 0 2rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            .hero,
            .features,
            .stats {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            header {
                flex-direction: column;
                align-items: start;
            }

            nav {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header style="background:linear-gradient(90deg,#ffcc00 60%,#c8832a 100%);color:#181a1f;padding:1.2rem 0 1rem 0;text-align:center;font-family:'Segoe UI',sans-serif;font-weight:700;font-size:1.3rem;letter-spacing:0.08em;box-shadow:0 2px 12px #222;display:flex;align-items:center;justify-content:center;gap:1.2rem;">
            <span style="font-size:2.2rem;vertical-align:middle;margin-right:0.7rem;">&#128295;</span>
            <span style="font-size:1.35rem;font-family:'Georgia',serif;color:#181a1f;letter-spacing:0.12em;">Dondlinger GC</span>
            <span style="font-size:1rem;color:#222;background:#f1c26d;border-radius:999px;padding:0.25rem 0.7rem;margin-left:0.7rem;">Jobsite Tools</span>
        </header>
        <section style="display:flex;flex-direction:column;align-items:center;padding:3rem 0 2rem;">
            <canvas id="dondlingerClock" width="260" height="260" style="background:transparent;border-radius:50%;box-shadow:0 0 32px #222;max-width:100%;"></canvas>
            <div style="margin-top:2rem;text-align:center;">
                <a class="cta" href="/calc/" style="background:linear-gradient(90deg,#ffcc00 60%,#c8832a 100%);color:#181a1f;font-weight:700;font-size:1.1rem;padding:1rem 2rem;border-radius:1rem;border:none;box-shadow:0 2px 8px #222;cursor:pointer;">Open Calculator</a>
                <div style="margin-top:1rem;color:#c8832a;font-size:1rem;">Install on your phone for offline use.</div>
            </div>
        </section>
        <footer style="text-align:center;padding:2rem 0 0;color:#c8832a;font-size:0.9rem;">&copy; 2026 Dondlinger General Contracting — Dondlinger GC Jobsite Tools</footer>
    </div>
    <script>
    // Animated Dondlinger clock widget
    const canvas = document.getElementById('dondlingerClock');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const center = size / 2;
      function drawClock() {
        ctx.clearRect(0, 0, size, size);
        // Outer ring
        ctx.save();
        ctx.beginPath();
        ctx.arc(center, center, center-8, 0, 2*Math.PI);
        ctx.lineWidth = 8;
        ctx.strokeStyle = '#d49b3e';
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#d49b3e';
        ctx.stroke();
        ctx.restore();
        // Hour marks
        for(let i=0;i<12;i++){
          const angle = (i/12)*2*Math.PI;
          const x1 = center + Math.cos(angle)*(center-28);
          const y1 = center + Math.sin(angle)*(center-28);
          const x2 = center + Math.cos(angle)*(center-16);
          const y2 = center + Math.sin(angle)*(center-16);
          ctx.beginPath();
          ctx.moveTo(x1,y1);
          ctx.lineTo(x2,y2);
          ctx.lineWidth = 3;
          ctx.strokeStyle = '#f1c26d';
          ctx.stroke();
        }
        // Brand center
        ctx.save();
        ctx.beginPath();
        ctx.arc(center, center, 22, 0, 2*Math.PI);
        ctx.fillStyle = '#12161c';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#d49b3e';
        ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.font = 'bold 1.2rem Georgia';
        ctx.fillStyle = '#d49b3e';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('DGC', center, center);
        ctx.restore();
        // Hands
        const now = new Date();
        const hour = now.getHours()%12;
        const min = now.getMinutes();
        const sec = now.getSeconds();
        // Hour hand
        let angle = ((hour + min/60)/12)*2*Math.PI - Math.PI/2;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.lineTo(center + Math.cos(angle)*(center-60), center + Math.sin(angle)*(center-60));
        ctx.lineWidth = 7;
        ctx.strokeStyle = '#d49b3e';
        ctx.stroke();
        ctx.restore();
        // Minute hand
        angle = ((min + sec/60)/60)*2*Math.PI - Math.PI/2;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.lineTo(center + Math.cos(angle)*(center-38), center + Math.sin(angle)*(center-38));
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#7dd6ff';
        ctx.stroke();
        ctx.restore();
        // Second hand
        angle = (sec/60)*2*Math.PI - Math.PI/2;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.lineTo(center + Math.cos(angle)*(center-28), center + Math.sin(angle)*(center-28));
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#f1c26d';
        ctx.stroke();
        ctx.restore();
      }
      setInterval(drawClock, 1000);
      drawClock();
    }
    </script>
</body>
</html>
